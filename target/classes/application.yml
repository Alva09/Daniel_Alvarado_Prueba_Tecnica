spring:
  application:
    name: gestion-polizas

  datasource:
    url: jdbc:h2:mem:polizasdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Configuración del negocio
negocio:
  ipc: 5.2
  api-key: "123456"

# Configuración del CORE mock
core:
  mock:
    url: http://localhost:8080/core-mock/evento
